<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="cappla">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>

  <title>cappla</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preconnect and Google Fonts -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let registration of registrations) {
          registration.unregister();
          console.log('Successfully unregistered stale service worker.');
        }
      }).catch(function(err) {
        console.error('Error unregistering service worker:', err);
      });
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* Styling for the startup loading screen */
    body {
      margin: 0;
      padding: 0;
      background-color: #f5fafb;
      font-family: 'Figtree', sans-serif;
    }
    #loader-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #f5fafb;
      z-index: 9999;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #e1e2ec;
      border-top: 4px solid #4e5b92;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .title {
      margin-top: 24px;
      font-size: 24px;
      font-weight: bold;
      color: #4e5b92;
      letter-spacing: 1.2px;
    }
    .footer {
      margin-top: 16px;
      display: flex;
      align-items: center;
      font-size: 14px;
      color: #44474f;
      font-weight: 500;
    }
    .vetter-logo {
      width: 14px;
      height: 14.92px;
      margin-left: 4px;
      margin-right: 4px;
    }
    .footer strong {
      font-weight: bold;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loader-container">
    <div class="spinner"></div>
    <div class="title">Cappla</div>
    <div class="footer">
      <span>Powered by </span>
      <svg class="vetter-logo" viewBox="0 0 1000 1065.7183">
        <path d="M500.0017,369.9204c-101.9864,0-184.9588-82.9745-184.9588-184.9602S398.0153,0,500.0017,0s184.9554,82.9745,184.9554,184.9602-82.9724,184.9602-184.9554,184.9602Z" fill="#001450"/>
        <path d="M500.0017,1065.7183L0,397.6206H366.0178l133.9838,169.7526,133.9838-169.7526h366.0145l-499.9983,668.0977Z" fill="#001450"/>
      </svg>
      <strong>Vetter</strong>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
